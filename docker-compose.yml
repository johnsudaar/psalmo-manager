services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: psalmo
      POSTGRES_PASSWORD: psalmo
      POSTGRES_DB: psalmo_manager_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec rails server -b 0.0.0.0
    user: "1000:1000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://psalmo:psalmo@postgres:5432
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      SECRET_KEY_BASE: dev_secret_key_base_not_used_in_production
    depends_on:
      - postgres
      - redis

  tailwind:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec rails tailwindcss:watch
    user: "1000:1000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec sidekiq
    user: "1000:1000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      DATABASE_URL: postgresql://psalmo:psalmo@postgres:5432
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      SECRET_KEY_BASE: dev_secret_key_base_not_used_in_production
    depends_on:
      - postgres
      - redis

  selenium:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: "2gb"

volumes:
  postgres_data:
  bundle_cache:
